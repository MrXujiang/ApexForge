<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline';" />
    <title>ApexForge Sandbox Runtime</title>
  </head>
  <body>
    <script>
      window.addEventListener('message', function handleMessage(event) {
        event.source.postMessage(
          {
            type: 'sandbox:not-implemented',
            message: 'Sandbox runtime placeholder is ready for iframe execution integration.',
          },
          event.origin,
        );
      });
    </script>
  </body>
</html>
